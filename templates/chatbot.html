<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vital AI Chatbot - Natural Health Solutions</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
        }

        .container {
            width: 100%;
            max-width: 800px;
            height: 90vh;
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #25bb62 0%, #1d8c47 100%);
            color: white;
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid #1d8c47;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background-color: #f5f5f5;
        }

        .message {
            margin-bottom: 15px;
            display: flex;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.user {
            justify-content: flex-end;
        }

        .message.bot {
            justify-content: flex-start;
        }

        .message-content {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 10px;
            word-wrap: break-word;
            line-height: 1.5;
        }

        .user .message-content {
            background-color: #25bb62;
            color: white;
            border-bottom-right-radius: 2px;
        }

        .bot .message-content {
            background-color: #e0e0e0;
            color: #333;
            border-bottom-left-radius: 2px;
        }

        .message-time {
            font-size: 12px;
            opacity: 0.7;
            margin-top: 5px;
            text-align: right;
        }

        .user .message-time {
            color: #25bb62;
        }

        .bot .message-time {
            color: #666;
        }

        .input-area {
            padding: 20px;
            background-color: white;
            border-top: 1px solid #ddd;
            display: flex;
            gap: 10px;
        }

        .input-field {
            flex: 1;
            display: flex;
            gap: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #25bb62;
        }

        button {
            padding: 12px 24px;
            background-color: #25bb62;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #1d8c47;
        }

        button:active {
            transform: scale(0.98);
        }

        button:disabled {
            background-color: #ccc;
            cursor: not-allowed;
        }

        .loading {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .loading span {
            width: 8px;
            height: 8px;
            background-color: #25bb62;
            border-radius: 50%;
            animation: bounce 1.4s infinite;
        }

        .loading span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .loading span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes bounce {
            0%, 80%, 100% {
                transform: translateY(0);
            }
            40% {
                transform: translateY(-10px);
            }
        }

        .welcome-message {
            text-align: center;
            color: #666;
            padding: 40px 20px;
            font-size: 14px;
        }

        .welcome-message h2 {
            color: #25bb62;
            margin-bottom: 10px;
            font-size: 18px;
        }

        .welcome-message p {
            margin: 5px 0;
        }

        .quick-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-top: 15px;
        }

        .quick-action-btn {
            padding: 8px 16px;
            background-color: #25bb62;
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 12px;
            transition: background-color 0.3s;
        }

        .quick-action-btn:hover {
            background-color: #1d8c47;
        }

        .error-message {
            background-color: #ffebee;
            color: #c62828;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 10px;
            text-align: center;
        }

        @media (max-width: 600px) {
            .message-content {
                max-width: 90%;
            }

            .header h1 {
                font-size: 18px;
            }

            .quick-actions {
                flex-direction: column;
            }

            .quick-action-btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌿 Vital Health Assistant</h1>
            <p>Les Laboratoires VITAL - Your Natural Health Partner</p>
        </div>

        <div class="messages-container" id="messagesContainer">
            <div class="welcome-message">
                <h2>Welcome to Vital Chatbot!</h2>
                <p>🌿 Ask me anything about our natural supplements and wellness products</p>
                <p>✅ 100% Natural | 🏆 20 Years Expertise | 🔬 Internationally Certified</p>
                <div class="quick-actions">
                    <button class="quick-action-btn" onclick="sendQuickMessage('What products do you offer?')">📦 Products</button>
                    <button class="quick-action-btn" onclick="sendQuickMessage('How can I contact Vital?')">📞 Contact</button>
                    <button class="quick-action-btn" onclick="sendQuickMessage('What certifications do you have?')">✅ Certifications</button>
                    <button class="quick-action-btn" onclick="sendQuickMessage('Tell me about your best sellers')">⭐ Best Sellers</button>
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-field">
                <input 
                    type="text" 
                    id="messageInput" 
                    placeholder="Type your question about Vital products..."
                    autocomplete="off"
                >
                <button id="sendBtn" onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>

    <script>
        const messagesContainer = document.getElementById('messagesContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        let sessionId = 'session_' + Date.now();
        let isWelcomeShown = true;

        // Clear welcome message on first real message
        function clearWelcome() {
            if (isWelcomeShown) {
                messagesContainer.innerHTML = '';
                isWelcomeShown = false;
            }
        }

        function sendQuickMessage(message) {
            messageInput.value = message;
            sendMessage();
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            clearWelcome();
            
            // Add user message to UI
            addMessage(message, 'user');
            messageInput.value = '';
            sendBtn.disabled = true;

            // Show loading indicator
            const loadingId = 'loading_' + Date.now();
            addLoadingMessage(loadingId);

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: message,
                        session_id: sessionId
                    })
                });

                const data = await response.json();
                
                // Remove loading message
                removeMessage(loadingId);

                if (data.success) {
                    addMessage(data.response, 'bot');
                } else {
                    addMessage('Sorry, I encountered an error: ' + data.error, 'bot');
                }
            } catch (error) {
                removeMessage(loadingId);
                addMessage('Connection error. Please try again.', 'bot');
            } finally {
                sendBtn.disabled = false;
                messageInput.focus();
            }
        }

        function addMessage(text, sender) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.textContent = text;
            
            const timeDiv = document.createElement('div');
            timeDiv.className = 'message-time';
            timeDiv.textContent = new Date().toLocaleTimeString();
            
            messageDiv.appendChild(contentDiv);
            messageDiv.appendChild(timeDiv);
            
            messagesContainer.appendChild(messageDiv);
            scrollToBottom();
        }

        function addLoadingMessage(id) {
            const messageDiv = document.createElement('div');
            messageDiv.id = id;
            messageDiv.className = 'message bot';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = `
                <div class="loading">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            `;
            
            messageDiv.appendChild(contentDiv);
            messagesContainer.appendChild(messageDiv);
            scrollToBottom();
        }

        function removeMessage(id) {
            const element = document.getElementById(id);
            if (element) {
                element.remove();
            }
        }

        function scrollToBottom() {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        // Send message on Enter key
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Initial focus
        messageInput.focus();
    </script>
</body>
</html>
